# LiteLLM router — local-only profile (T-0012)
# No cloud keys. See README.md for host vs cage api_base.
#
# export OLLAMA_API_BASE=http://127.0.0.1:11434          # host
# export OLLAMA_API_BASE=http://host.docker.internal:11435  # cage + gateway

model_list:
  - model_name: local-coder
    litellm_params:
      model: ollama/deepseek-coder:latest
      api_base: os.environ/OLLAMA_API_BASE

  - model_name: local-default
    litellm_params:
      model: ollama/deepseek-coder:latest
      api_base: os.environ/OLLAMA_API_BASE

litellm_settings:
  drop_params: true
  request_timeout: 300

general_settings:
  master_key: null
