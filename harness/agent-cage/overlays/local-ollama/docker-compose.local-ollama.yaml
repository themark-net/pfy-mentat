# Compose fragment for host Ollama access from agent-cage.
# Loaded explicitly by make local-ollama-up / smoke-litellm-ollama (agentcage CLI
# does not auto-load extra -f files).
#
# Host Ollama often binds 127.0.0.1 only. Run the user-space gateway first:
#   examples/litellm-ollama/host-ollama-gateway.sh start
# which publishes 0.0.0.0:11435 → 127.0.0.1:11434 without sudo.

services:
  proxy:
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # From inside the cage, never use 127.0.0.1 for host Ollama.
      - OLLAMA_HOST=http://host.docker.internal:11435
      - OPENAI_BASE_URL=http://host.docker.internal:11435/v1
      - LITELLM_SMOKE_MODEL=${LITELLM_SMOKE_MODEL:-deepseek-coder:latest}
      - DEPLOY_PROFILE=${DEPLOY_PROFILE:-local-only}
