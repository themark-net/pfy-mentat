# Policy: coding-agent + xAI/Grok Build CLI + host Ollama (whitelist)
# Install: make grok-overlay-install  → policies/coding-agent-grok.yaml
# Use:     POLICY=coding-agent-grok make grok-up   (always for Grok-in-cage)
#
# Note: mitmproxy matching uses single-label glob: *.x.ai matches auth.x.ai,
# but does NOT match apex grok.com — list apex hosts explicitly.
# Grok Build also hits storage.googleapis.com for CLI artifacts and grok.com for telemetry.

policy:
  name: "coding-agent-grok"
  version: "1.1"
  mode: "whitelist"

  defaults:
    max_request_size_bytes: 10485760
    max_response_size_bytes: 104857600
    timeout_seconds: 300
    log_level: "info"
    log_bodies: false

  domains:
    # --- xAI / Grok Build CLI (required for chat API + auth refresh) ---
    - pattern: "x.ai"
      methods: ["GET", "HEAD", "POST", "PUT", "OPTIONS"]
    - pattern: "*.x.ai"
      methods: ["GET", "HEAD", "POST", "PUT", "OPTIONS"]
    - pattern: "api.x.ai"
      methods: ["GET", "HEAD", "POST", "PUT", "OPTIONS"]
    - pattern: "auth.x.ai"
      methods: ["GET", "HEAD", "POST", "PUT", "OPTIONS"]
    - pattern: "accounts.x.ai"
      methods: ["GET", "HEAD", "POST", "PUT", "OPTIONS"]
    - pattern: "console.x.ai"
      methods: ["GET", "HEAD", "POST", "PUT", "OPTIONS"]
    # Apex + subdomains (telemetry, marketing assets)
    - pattern: "grok.com"
      methods: ["GET", "HEAD", "POST", "PUT", "OPTIONS"]
    - pattern: "*.grok.com"
      methods: ["GET", "HEAD", "POST", "PUT", "OPTIONS"]
    - pattern: "cli-chat-proxy.grok.com"
      methods: ["GET", "HEAD", "POST", "PUT", "OPTIONS"]
    # CLI release artifacts (blocked without this → update/bootstrap failures)
    - pattern: "storage.googleapis.com"
      methods: ["GET", "HEAD"]
    - pattern: "*.googleapis.com"
      methods: ["GET", "HEAD", "POST"]
    - pattern: "googleapis.com"
      methods: ["GET", "HEAD"]

    # --- Host Ollama (so Grok+local can share one policy) ---
    - pattern: "host.docker.internal"
      methods: ["GET", "HEAD", "POST", "OPTIONS"]

    # --- Other AI APIs ---
    - pattern: "api.openai.com"
      methods: ["POST", "GET"]
    - pattern: "api.anthropic.com"
      methods: ["POST", "GET"]
    - pattern: "generativelanguage.googleapis.com"
      methods: ["POST", "GET"]
    - pattern: "api.groq.com"
      methods: ["POST", "GET"]

    # --- Package Registries ---
    - pattern: "*.pypi.org"
      methods: ["GET", "HEAD"]
    - pattern: "pypi.org"
      methods: ["GET", "HEAD"]
    - pattern: "files.pythonhosted.org"
      methods: ["GET", "HEAD"]
    - pattern: "registry.npmjs.org"
      methods: ["GET", "HEAD"]
    - pattern: "*.npmjs.org"
      methods: ["GET", "HEAD"]
    - pattern: "registry.yarnpkg.com"
      methods: ["GET", "HEAD"]
    - pattern: "crates.io"
      methods: ["GET", "HEAD"]
    - pattern: "static.crates.io"
      methods: ["GET", "HEAD"]
    - pattern: "rubygems.org"
      methods: ["GET", "HEAD"]
    - pattern: "pkg.go.dev"
      methods: ["GET", "HEAD"]
    - pattern: "proxy.golang.org"
      methods: ["GET", "HEAD"]
    - pattern: "sum.golang.org"
      methods: ["GET", "HEAD"]

    # --- Source Code ---
    - pattern: "github.com"
      methods: ["GET", "HEAD", "POST"]
    - pattern: "*.githubusercontent.com"
      methods: ["GET", "HEAD"]
    - pattern: "raw.githubusercontent.com"
      methods: ["GET", "HEAD"]
    - pattern: "gitlab.com"
      methods: ["GET", "HEAD", "POST"]
    - pattern: "*.gitlab.com"
      methods: ["GET", "HEAD"]
    - pattern: "bitbucket.org"
      methods: ["GET", "HEAD"]

    # --- OS Packages ---
    - pattern: "*.ubuntu.com"
      methods: ["GET", "HEAD"]
    - pattern: "*.debian.org"
      methods: ["GET", "HEAD"]
    - pattern: "archive.ubuntu.com"
      methods: ["GET", "HEAD"]
    - pattern: "security.ubuntu.com"
      methods: ["GET", "HEAD"]
    - pattern: "dl-cdn.alpinelinux.org"
      methods: ["GET", "HEAD"]

    # --- Documentation ---
    - pattern: "docs.python.org"
      methods: ["GET", "HEAD"]
    - pattern: "docs.x.ai"
      methods: ["GET", "HEAD"]
    - pattern: "nodejs.org"
      methods: ["GET", "HEAD"]
    - pattern: "developer.mozilla.org"
      methods: ["GET", "HEAD"]
    - pattern: "stackoverflow.com"
      methods: ["GET", "HEAD"]
    - pattern: "*.stackoverflow.com"
      methods: ["GET", "HEAD"]

  content_filters: []
  rate_limits:
    global:
      requests_per_minute: 500
      requests_per_hour: 10000
