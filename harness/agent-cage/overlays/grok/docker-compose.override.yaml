# Grok image + auth.json only (do not mount whole .grok — that hid the binary).
# make grok-overlay-install → $AGENTCAGE_DIR/docker/docker-compose.override.yaml
#
# Auth: make grok-auth-import  →  ~/.agentcage/grok-home/auth.json

services:
  agent:
    image: local-llm-dev-tools/agent-cage-grok:0.1.0
    build:
      context: ./overlays-grok
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: agent-cage-agent:latest
    environment:
      - HOME=/home/agent
      - GROK_HOME=/home/agent/.grok
      - PATH=/usr/local/bin:/home/agent/.local/bin:/opt/agent-env/bin:/usr/local/sbin:/usr/bin:/bin
      - XAI_API_KEY=${XAI_API_KEY:-}
    volumes:
      # File mount: OIDC session only (refresh may rewrite this file)
      - ../grok-home/auth.json:/home/agent/.grok/auth.json
